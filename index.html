<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Think Level 0 v3.0 Memory System</title>

<style>
body{
font-family: Arial;
background:#f2f2f2;
text-align:center;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:20px;
margin-top:20px;
border-radius:12px;
}

button{
padding:8px 12px;
margin:5px;
border-radius:8px;
border:1px solid #ccc;
background:#fff;
cursor:pointer;
}

.card{
font-size:28px;
padding:50px;
margin:20px;
background:#f8f8f8;
border-radius:12px;
cursor:pointer;
user-select:none;
}

input{
padding:10px;
width:70%;
font-size:16px;
}
</style>
</head>

<body>

<div class="container">

<h2>Think Level 0 v3.0 Memory System</h2>

<div id="menu"></div>
<hr>

<div id="app"></div>

</div>

<script>

// =====================
// 词库
// =====================
const data = {
Welcome:[
["black","黑色"],["blue","蓝色"],["red","红色"],["green","绿色"],
["morning","早上"],["book","书"],["pen","钢笔"]
],
Unit1:[
["Brazil","巴西"],["Japan","日本"],["China","中国"],
["teacher","老师"],["student","学生"],
["mountain","山"],["sea","海"]
],
Unit2:[],Unit3:[],Unit4:[],Unit5:[],
Unit6:[],Unit7:[],Unit8:[],Unit9:[],
Unit10:[],Unit11:[],Unit12:[]
};

// =====================
// SRS 记忆系统（简化版）
// =====================

function getDB(){
let db=localStorage.getItem("vocab_v3");
return db?JSON.parse(db):{};
}

function saveDB(db){
localStorage.setItem("vocab_v3",JSON.stringify(db));
}

// 初始化单词
function initDB(){
let db=getDB();

for(let unit in data){
data[unit].forEach(w=>{
let key=unit+"_"+w[0];
if(!db[key]){
db[key]={
word:w[0],
meaning:w[1],
level:0,
next:Date.now()
};
}
});
}

saveDB(db);
}

// 获取可学习单词（间隔复习）
function getDueWords(unit){
let db=getDB();
let list=[];

for(let k in db){
if(k.startsWith(unit+"_") && db[k].next<=Date.now()){
list.push(db[k]);
}
}

return list.length?list:data[unit].map(w=>({word:w[0],meaning:w[1],level:0,key:unit+"_"+w[0]}));
}

// =====================
// 状态
// =====================
let currentUnit="Welcome";
let currentWord=null;
let showBack=false;

// =====================
// 菜单
// =====================
function renderMenu(){
let html="";
for(let u in data){
html+=`<button onclick="switchUnit('${u}')">${u}</button>`;
}
document.getElementById("menu").innerHTML=html;
}

function switchUnit(u){
currentUnit=u;
nextCard();
}

// =====================
// 发音
// =====================
function speak(word){
let s=new SpeechSynthesisUtterance(word);
s.lang="en-US";
speechSynthesis.speak(s);
}

// =====================
// 卡片模式（核心）
// =====================
function nextCard(){

let list=getDueWords(currentUnit);
currentWord=list[Math.floor(Math.random()*list.length)];
showBack=false;

document.getElementById("app").innerHTML=`
<div class="card" onclick="flip()">
${currentWord.word}
</div>

<button onclick="speak('${currentWord.word}')">🔊 发音</button>

<br><br>

<input id="inp" placeholder="输入中文或英文">
<button onclick="check()">提交</button>

<br><br>

<button onclick="nextCard()">下一张</button>
`;
}

function flip(){
showBack=!showBack;
document.querySelector(".card").innerHTML=
showBack?currentWord.meaning:currentWord.word;
}

// =====================
// SRS更新算法（核心）
// =====================
function updateMemory(correct){

let db=getDB();
let key=currentUnit+"_"+currentWord.word;

if(!db[key]) return;

if(correct){
db[key].level++;
db[key].next=Date.now()+Math.pow(2,db[key].level)*60000;
}else{
db[key].level=0;
db[key].next=Date.now()+60000;
}

saveDB(db);
}

// =====================
// 判断
// =====================
function check(){

let val=document.getElementById("inp").value.trim();

let ok =
val.toLowerCase()===currentWord.word.toLowerCase() ||
val===currentWord.meaning;

if(ok){
updateMemory(true);
alert("✔ 正确");
}else{
updateMemory(false);
alert("❌ 错误："+currentWord.word+" / "+currentWord.meaning);
}

nextCard();
}

// =====================
// 初始化
// =====================
initDB();
renderMenu();
nextCard();

</script>

</body>
</html>
