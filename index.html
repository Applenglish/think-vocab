<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Think Level 0 v5.1 APP Edition</title>

<style>
body{
font-family: Arial;
background:#eef0f3;
margin:0;
text-align:center;
}

/* 容器升级为App卡片风格 */
.container{
max-width:600px;
margin:20px auto;
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* 学生栏 */
input{
padding:10px;
font-size:16px;
border-radius:10px;
border:1px solid #ccc;
}

/* 卡片APP风格 */
.card{
font-size:34px;
padding:70px 20px;
margin:20px 0;
background:linear-gradient(135deg,#fafafa,#e9e9e9);
border-radius:25px;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
transition:0.2s;
user-select:none;
}

.card:active{
transform:scale(0.98);
}

/* 按钮 */
button{
padding:8px 12px;
margin:5px;
border-radius:10px;
border:1px solid #ccc;
background:#fff;
cursor:pointer;
}

/* 底部控制栏 */
.bottom-bar{
position:fixed;
bottom:0;
left:0;
width:100%;
background:white;
padding:10px;
border-top:1px solid #ddd;
display:flex;
justify-content:center;
gap:10px;
}

.bottom-bar button{
font-size:18px;
width:60px;
height:40px;
}
</style>
</head>

<body>

<div class="container">

<h2>Think Level 0 v5.1</h2>

<!-- 学生系统 -->
<div>
学生：
<input id="stu" placeholder="Student1">
<button onclick="setStudent()">切换</button>
</div>

<hr>

<div id="menu"></div>

<hr>

<div>
<button onclick="showStats()">📊统计</button>
<button onclick="showWrong()">❌错题</button>
</div>

<div id="app"></div>

</div>

<!-- 底部APP控制栏 -->
<div class="bottom-bar">
<button onclick="speak(currentWord.word)">🔊</button>
<button onclick="nextCard()">⏭</button>
<button onclick="showWrong()">❌</button>
</div>

<script>

let student = localStorage.getItem("student") || "Student1";

// =====================
// 词库
// =====================
const data = {
Welcome:[
["black","黑色"],["blue","蓝色"],["red","红色"],
["morning","早上"],["book","书"],["pen","钢笔"]
],
Unit1:[
["Brazil","巴西"],["Japan","日本"],["China","中国"],
["teacher","老师"],["student","学生"],
["mountain","山"],["sea","海"]
],
Unit2:[],Unit3:[],Unit4:[],Unit5:[],
Unit6:[],Unit7:[],Unit8:[],Unit9:[],
Unit10:[],Unit11:[],Unit12:[]
};

// =====================
// 数据（按学生）
function getDB(){
let db = localStorage.getItem("vocab_v5_"+student);
return db?JSON.parse(db):{};
}

function saveDB(db){
localStorage.setItem("vocab_v5_"+student,JSON.stringify(db));
}

// 初始化
function initDB(){
let db=getDB();

for(let u in data){
data[u].forEach(w=>{
let key=u+"_"+w[0];
if(!db[key]){
db[key]={
word:w[0],
meaning:w[1],
level:0,
next:Date.now()
};
}
});
}

saveDB(db);
}

// =====================
// SRS
function getDue(unit){
let db=getDB();
let list=[];

for(let k in db){
if(k.startsWith(unit+"_") && db[k].next<=Date.now()){
list.push(db[k]);
}
}

if(list.length===0){
return data[unit].map(w=>({word:w[0],meaning:w[1]}));
}

return list;
}

// =====================
// 状态
let currentUnit="Welcome";
let currentWord=null;
let wrong=[];

// =====================
// 学生切换
function setStudent(){
student=document.getElementById("stu").value;
localStorage.setItem("student",student);
initDB();
nextCard();
alert("当前学生："+student);
}

// =====================
// 菜单
function renderMenu(){
let html="";
for(let u in data){
html+=`<button onclick="switchUnit('${u}')">${u}</button>`;
}
document.getElementById("menu").innerHTML=html;
}

function switchUnit(u){
currentUnit=u;
nextCard();
}

// =====================
// 发音
function speak(word){
let u=new SpeechSynthesisUtterance(word);
u.lang="en-US";
u.rate=0.9;
speechSynthesis.speak(u);
}

// =====================
// 卡片
function nextCard(){

let list=getDue(currentUnit);
currentWord=list[Math.floor(Math.random()*list.length)];

document.getElementById("app").innerHTML=`
<div class="card" onclick="flip()">
${currentWord.word}
</div>

<input id="inp" placeholder="输入英文或中文">
<button onclick="check()">提交</button>
`;
}

function flip(){
document.querySelector(".card").innerHTML=
currentWord.meaning;
}

// =====================
// 记忆更新
function updateMemory(ok){
let db=getDB();
let key=currentUnit+"_"+currentWord.word;

if(!db[key]) return;

if(ok){
db[key].level++;
db[key].next=Date.now()+Math.pow(2,db[key].level)*60000;
}else{
db[key].level=0;
db[key].next=Date.now()+60000;
wrong.push(currentWord);
}

saveDB(db);
}

// =====================
// 判断
function check(){
let v=document.getElementById("inp").value.trim();

let ok =
v.toLowerCase()===currentWord.word.toLowerCase() ||
v===currentWord.meaning;

updateMemory(ok);

alert(ok?"✔ 正确":"❌ 错误");

nextCard();
}

// =====================
// 错题
function showWrong(){
let html="<h3>错题本</h3>";
wrong.forEach(w=>{
html+=w.word+" - "+w.meaning+"<br>";
});
document.getElementById("app").innerHTML=html;
}

// =====================
// 统计
function showStats(){
let db=getDB();
let total=0, mastered=0;

for(let k in db){
total++;
if(db[k].level>=2) mastered++;
}

document.getElementById("app").innerHTML=`
<h3>${student} 学习统计</h3>
<p>总词汇：${total}</p>
<p>掌握：${mastered}</p>
`;
}

// =====================
// 初始化
initDB();
renderMenu();
nextCard();

</script>

</body>
</html>
