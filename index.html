<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Think Level 0 Vocabulary Practice</title>

<style>

body{
font-family: Arial;
text-align:center;
background:#f5f5f5;
}

.container{
width:500px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
margin-top:40px;
}

button{
padding:10px 20px;
margin:10px;
font-size:16px;
}

input{
padding:10px;
font-size:16px;
}

</style>

</head>

<body>

<div class="container">

<h2>Think Level 0 Vocabulary</h2>

<p id="question">点击开始</p>

<input id="answer" placeholder="输入答案">

<br><br>

<button onclick="check()">提交</button>

<button onclick="next()">下一题</button>

<p id="result"></p>

</div>

<script>

let vocab=[
{cn:"苹果",en:"apple"},
{cn:"猫",en:"cat"},
{cn:"狗",en:"dog"},
{cn:"书",en:"book"}
]

let current

function next(){

current=vocab[Math.floor(Math.random()*vocab.length)]

document.getElementById("question").innerText=current.cn

document.getElementById("answer").value=""

document.getElementById("result").innerText=""

}

function check(){

let a=document.getElementById("answer").value

if(a==current.en){
document.getElementById("result").innerText="正确！"
}
else{
document.getElementById("result").innerText="正确答案："+current.en
}

}

</script>

</body>

</html>
